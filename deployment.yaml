apiVersion: apps/v1
kind: Deployment
metadata:
  name: practice-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: practice-v1
  template:
    metadata:
      labels:
        app: practice-v1
    spec:
      containers:
      - name: practice-app
        # Make sure this matches exactly what you pushed to Docker Hub!
        image: ramithas/practice:v1 
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: practice-svc-v1
spec:
  type: NodePort
  selector:
    app: practice-v1
  ports:
    - port: 80
      targetPort: 8080
      # Changed to 30001 as standard K8s NodePort range is 30000-32767
      nodePort: 30007